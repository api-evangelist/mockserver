apis:
- aid: mockserver:mockserver
  name: MockServer
  description: MockServer is a flexible open-source tool for mocking and proxying HTTP and HTTPS requests. It exposes a simple
    REST control plane for creating expectations, verifying received requests, retrieving recorded traffic, and managing the
    running mock or proxy process.
