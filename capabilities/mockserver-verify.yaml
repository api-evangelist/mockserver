naftiko: 1.0.0-alpha2
info:
  label: MockServer API — verify
  description: 'MockServer API — verify. 2 operations. Lead operation: verify a request has been received a specific number
    of times. Self-contained Naftiko capability covering one Mockserver business surface.'
  tags:
  - Mockserver
  - verify
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MOCKSERVER_API_KEY: MOCKSERVER_API_KEY
capability:
  consumes:
  - type: http
    namespace: mockserver-verify
    baseUri: http://localhost:1080
    description: MockServer API — verify business capability. Self-contained, no shared references.
    resources:
    - name: mockserver-verify
      path: /mockserver/verify
      operations:
      - name: put
        method: PUT
        description: verify a request has been received a specific number of times
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: mockserver-verifySequence
      path: /mockserver/verifySequence
      operations:
      - name: put
        method: PUT
        description: verify a sequence of request has been received in the specific order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: mockserver-verify-rest
    port: 8080
    description: REST adapter for MockServer API — verify. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/mockserver/verify
      name: mockserver-verify
      description: REST surface for mockserver-verify.
      operations:
      - method: PUT
        name: put
        description: verify a request has been received a specific number of times
        call: mockserver-verify.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/mockserver/verifysequence
      name: mockserver-verifysequence
      description: REST surface for mockserver-verifySequence.
      operations:
      - method: PUT
        name: put
        description: verify a sequence of request has been received in the specific order
        call: mockserver-verify.put
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mockserver-verify-mcp
    port: 9090
    transport: http
    description: MCP adapter for MockServer API — verify. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: verify-request-has-been-received
      description: verify a request has been received a specific number of times
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mockserver-verify.put
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: verify-sequence-request-has-been
      description: verify a sequence of request has been received in the specific order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mockserver-verify.put
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
