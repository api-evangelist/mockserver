        destructive: false
        idempotent: true
      call: mockserver-control.put
      with:
        type: tools.type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: clears-all-expectations-and-recorded
      description: clears all expectations and recorded requests
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mockserver-control.put
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-recorded-requests-active-expectations
      description: retrieve recorded requests, active expectations, recorded expectations or log messages
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: mockserver-control.put
      with:
        format: tools.format
        type: tools.type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: return-listening-ports
      description: return listening ports
      hints:
        readOnly: false
